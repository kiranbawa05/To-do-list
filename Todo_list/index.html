<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To do list</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="list_name">
            <h1>TO-DO LIST</h1>
    </div>
    <br>
    <div class="container">
        <div class="main">
            <div class="inputs">
                <input id="text" type="text" placeholder="Enter task">
                <input id="time" type="time">
                <button id="button" onclick="add()" type="submit" >Add task</button>
            </div>
        </div>
    <br>
    <br>
        <div class="list">
            <ul id="list"></ul>
        </div>

    </div>
    
    <script src="index.js"></script>
</body>
</html>
